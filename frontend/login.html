<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企业知识库RAG系统 - 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'SF Pro Display', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #ffffff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1d1d1f;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border: 1px solid #e5e5ea;
            border-radius: 18px;
            background: #ffffff;
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo h1 {
            font-size: 28px;
            color: #1d1d1f;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .logo p {
            font-size: 16px;
            color: #86868b;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 16px;
            font-weight: 500;
            color: #1d1d1f;
        }

        .form-group input {
            width: 100%;
            padding: 16px;
            border: 2px solid #e5e5ea;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: all 0.2s ease;
        }

        .form-group input:focus {
            border-color: #1d1d1f;
        }

        .captcha-group {
            display: flex;
            gap: 12px;
        }

        .captcha-group input {
            flex: 1;
        }

        .captcha-image {
            width: 120px;
            height: 56px;
            border: 2px solid #e5e5ea;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
            background: #f5f5f7;
            letter-spacing: 4px;
            cursor: pointer;
        }

        .captcha-image:hover {
            background: #e8e8ed;
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: #1d1d1f;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.2s ease;
            margin-top: 24px;
        }

        .login-btn:hover {
            background: #3a3a3c;
        }

        .login-btn:active {
            background: #000000;
        }

        .error-message {
            color: #ff3b30;
            font-size: 14px;
            margin-top: 12px;
            text-align: center;
        }

        .default-credentials {
            margin-top: 24px;
            padding: 16px;
            background: #f5f5f7;
            border-radius: 12px;
            font-size: 14px;
            color: #86868b;
            text-align: center;
        }

        .default-credentials strong {
            color: #1d1d1f;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>🧠 企业知识库</h1>
            <p>RAG智能问答系统</p>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" placeholder="请输入用户名" required>
            </div>
            
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="请输入密码" required>
            </div>
            
            <div class="form-group">
                <label for="captcha">验证码</label>
                <div class="captcha-group">
                    <input type="text" id="captcha" name="captcha" placeholder="请输入验证码" required>
                    <div class="captcha-image" id="captchaImage">
                        点击刷新
                    </div>
                </div>
            </div>
            
            <button type="submit" class="login-btn">登录</button>
            
            <div id="errorMessage" class="error-message" style="display: none;"></div>
        </form>
        
        <div class="default-credentials">
            默认账号：<strong>admin</strong><br>
            默认密码：<strong>123456</strong>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
